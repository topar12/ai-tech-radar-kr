name: Deploy Lokana Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Check Cloudflare credentials
        id: cloudflare
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Cloudflare secrets are not configured; skipping Pages deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.cloudflare.outputs.ready == 'true'
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: steps.cloudflare.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build static site
        if: steps.cloudflare.outputs.ready == 'true'
        env:
          LOKANA_API_BASE_URL: https://api.lokana.kr
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=lokana --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
