services:
  - type: web
    name: ai-tech-radar-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --app-dir . --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: radar-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_NAME
        value: AI Tech Radar Backend
      - key: DATABASE_URL
        value: sqlite:////var/data/localai-radar.sqlite3
      - key: COLLECTOR_TIMEOUT_SECONDS
        value: "15"
      - key: COLLECTOR_MAX_ITEMS_PER_FEED
        value: "4"
      - key: SSL_CERT_FILE
        value: /etc/ssl/cert.pem
  - type: web
    name: ai-tech-radar-web
    runtime: static
    buildCommand: bash scripts/build-static.sh
    staticPublishPath: ./dist
    headers:
      - path: /runtime-config.js
        name: Cache-Control
        value: no-store
